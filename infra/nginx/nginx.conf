# ═══════════════════════════════════════════
# Nginx Reverse Proxy / Load Balancer
# ═══════════════════════════════════════════

upstream api_servers {
    # Round-robin across API server instances
    server api:3000;
    # Add more instances for horizontal scaling:
    # server api-2:3000;
    # server api-3:3000;
    keepalive 64;
}

server {
    listen 80;
    server_name sho.rt;

    # ─── Security Headers ───
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── Rate Limiting Zones ───
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=redirect_limit:10m rate=100r/s;

    # ─── Redirect Endpoint (HOT PATH — highest priority) ───
    location ~ ^/[a-zA-Z0-9_-]{3,20}$ {
        limit_req zone=redirect_limit burst=50 nodelay;

        proxy_pass http://api_servers;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Redirect responses should not be cached by Nginx
        proxy_no_cache 1;
        proxy_cache_bypass 1;
    }

    # ─── API Endpoints ───
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://api_servers;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Limit request body size
        client_max_body_size 1k;
    }

    # ─── Health Check ───
    location /health {
        proxy_pass http://api_servers;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # ─── Deny everything else ───
    location / {
        return 404;
    }
}
